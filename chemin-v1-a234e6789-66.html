<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #F8FAF9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Playfair Display', serif;
            color: #1A3C2F;
            text-align: center;
        }
        .logo {
            width: 80px;
            opacity: 0.5;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.2rem; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #B08D3E; font-family: sans-serif; }
        .retry-btn {
            margin-top: 25px;
            padding: 10px 20px;
            border: 1px solid #B08D3E;
            background: transparent;
            color: #B08D3E;
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <img src="logo.png" class="logo" alt="Chemin">
    <h1>Verbindung wird gesucht...</h1>
    <p></p>Die App wird bald verfügbar sein...</p>
    <p>O concerto aguarda a sua conexão.</p>
    <button class="retry-btn" onclick="window.location.reload()">Tentar novamente</button>
    <iframe src="https://visualizar-chemim.blogspot.com/2026/03/visualizar-chemin.html" width="1" height="1" title="RBA"></iframe>
</body>
</html>
